name: Build Chrome Extension

on:
  push:
    branches: [prod]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from manifest
        id: version
        run: |
          VERSION=$(jq -r '.version' manifest.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create ZIP package
        run: |
          zip -r ai-price-compare-${{ steps.version.outputs.version }}.zip \
            manifest.json \
            src/ \
            README.md \
            -x "*.git*" "node_modules/*" "tests/*" ".agents/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## AI SaaS Price Compare v${{ steps.version.outputs.version }}

            ### 安装方法
            1. 下载下方 ZIP 文件
            2. 解压到本地目录
            3. 打开 Chrome，访问 `chrome://extensions/`
            4. 开启"开发者模式"
            5. 点击"加载已解压的扩展程序"
            6. 选择解压后的文件夹
          files: ai-price-compare-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false
